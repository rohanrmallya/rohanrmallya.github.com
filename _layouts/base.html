<!-- /_layouts/base.html -->
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{'/assets/stylesheets/main.css'}}" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link
      rel="icon"
      type="image/x-icon"
      href="{{'/assets/imgs/favicon/favicon.ico'}}"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{'/assets/imgs/favicon/apple-touch-icon.png'}}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{'/assets/imgs/favicon/favicon-32x32.png'}}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{'/assets/imgs/favicon/favicon-16x16.png'}}"
    />
    <link rel="manifest" href="{{'/assets/imgs/favicon/site.webmanifest'}}" />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-W7DQDC36JQ"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-W7DQDC36JQ");
    </script>

    <script src="{{'/assets/js/cal.js'}}"></script>
  </head>

  <body
    class="bg-[#f9f9fb] text-[#1c1b1c] dark:bg-[#131314] dark:text-[#e5e2e3] font-sans antialiased"
  >
    <!-- Include the navbar component -->
    {% include navbar.html %}

    <!-- Main Content -->
    <main>{{ content }}</main>

    <!-- Footer -->
    <footer class="w-full py-12 border-t border-black/5 dark:border-white/10 bg-white dark:bg-[#131314]">
      <div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto space-y-4 md:space-y-0">
        <div class="text-sm font-bold tracking-tighter text-[#1c1b1c] dark:text-[#e5e2e3]">ROHAN.MALLYA</div>
        <div class="flex space-x-12">
          <a class="text-xs uppercase tracking-widest font-semibold text-[#1c1b1c]/40 dark:text-[#e5e2e3]/40 hover:text-[#0056b3] dark:hover:text-[#acc7ff] transition-colors" href="https://x.com/rohanrmallya">Twitter</a>
          <a class="text-xs uppercase tracking-widest font-semibold text-[#1c1b1c]/40 dark:text-[#e5e2e3]/40 hover:text-[#0056b3] dark:hover:text-[#acc7ff] transition-colors" href="https://www.linkedin.com/in/rohanmallya/">LinkedIn</a>
          <a class="text-xs uppercase tracking-widest font-semibold text-[#1c1b1c]/40 dark:text-[#e5e2e3]/40 hover:text-[#0056b3] dark:hover:text-[#acc7ff] transition-colors" href="https://github.com/rohanrmallya">GitHub</a>
        </div>
        <div class="text-xs uppercase tracking-widest font-semibold text-[#1c1b1c]/40 dark:text-[#e5e2e3]/40">&copy; {{ site.time | date: '%Y' }} Rohan Mallya</div>
      </div>
    </footer>

    <!-- Dark Mode Toggle Script -->
  </body>
  <script>
    const darkModeToggle = document.getElementById("darkModeToggle");
    const htmlElement = document.documentElement;

    darkModeToggle.addEventListener("click", () => {
      if (htmlElement.classList.contains("dark")) {
        htmlElement.classList.remove("dark");
        localStorage.setItem("theme", "light");
      } else {
        htmlElement.classList.add("dark");
        localStorage.setItem("theme", "dark");
      }
    });

    // Set initial theme based on localStorage or system preference
    if (
      localStorage.getItem("theme") === "dark" ||
      (!localStorage.getItem("theme") &&
        window.matchMedia("(prefers-color-scheme: dark)").matches)
    ) {
      htmlElement.classList.add("dark");
    } else {
      htmlElement.classList.remove("dark");
    }
  </script>
</html>
